<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeApp | Запуск</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Хедер лончера */
        .launcher-header {
            background: var(--tg-theme-bg-color, #1a1a1a);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--tg-theme-section-separator-color, #333);
            position: relative;
            z-index: 10;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--tg-theme-button-color, #40a7e3);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 12px 4px 4px;
        }

        .game-title-mini {
            flex: 1;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fullscreen-button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Контейнер для игры */
        .game-frame-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            padding: 0;
            overflow: hidden;
        }

        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
            transition: transform 0.3s ease;
        }

        /* Лоадер */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--tg-theme-bg-color, #1a1a1a);
            z-index: 5;
            gap: 20px;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-secondary-bg-color, #333);
            border-top-color: var(--tg-theme-button-color, #40a7e3);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            color: var(--tg-theme-hint-color, #999);
            font-size: 16px;
        }

        /* Сообщение об ошибке */
        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            z-index: 20;
        }

        .error-card {
            background: var(--tg-theme-secondary-bg-color, #222);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="launcher-header" style="background: var(--tg-theme-bg-color);">
        <button class="back-button" onclick="goBack()">←</button>
        <span class="game-title-mini" id="gameTitle">Загрузка...</span>
        <button class="fullscreen-button" onclick="toggleFullscreen()">⛶</button>
    </div>

    <div class="game-frame-container" id="frameContainer">
        <iframe class="game-frame" id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen"></iframe>
    </div>

    <div class="loader-container" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Загружаем игру...</div>
    </div>

    <div id="errorOverlay" style="display: none;" class="error-overlay">
        <div class="error-card">
            <div style="font-size: 48px; margin-bottom: 20px;">😵</div>
            <div style="font-size: 18px; margin-bottom: 20px;">Не удалось загрузить игру</div>
            <button class="fullscreen-button" onclick="goBack()" style="padding: 12px 24px;">Вернуться</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.disableVerticalSwipes();
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');
        
        const gameFrame = document.getElementById('gameFrame');
        const loader = document.getElementById('loader');
        const gameTitleEl = document.getElementById('gameTitle');
        const errorOverlay = document.getElementById('errorOverlay');

        let currentGame = null;

        if (!gameId) {
            window.location.href = 'index.html';
        }

        // Загрузка данных игры
        async function loadGameData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/games.json');
                const games = await response.json();
                const game = games.find(g => g.id == gameId);
                
                if (!game) throw new Error('Игра не найдена');
                
                currentGame = game;
                gameTitleEl.textContent = game.title;
                
                // Устанавливаем ориентацию iframe
                applyOrientation(game.orientation);
                
                // Загружаем игру в iframe
                gameFrame.src = game.gameUrl;
                
                // Скрываем лоадер через 2 секунды или при загрузке iframe
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                loader.style.display = 'none';
                errorOverlay.style.display = 'flex';
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Применение ориентации
        function applyOrientation(orientation) {
            const container = document.getElementById('frameContainer');
            
            // Сбрасываем трансформации
            gameFrame.style.transform = 'none';
            gameFrame.style.width = '100%';
            gameFrame.style.height = '100%';
            
            if (orientation === 'landscape') {
                // Для ландшафтных игр в портретном контейнере Telegram Mini App
                // Поворачиваем и масштабируем, чтобы игра влезла
                gameFrame.style.transform = 'rotate(90deg) scale(1.2)';
                gameFrame.style.width = '100vh';
                gameFrame.style.height = '100vw';
                container.style.alignItems = 'center';
                container.style.justifyContent = 'center';
            } else {
                // Для портретных — нормально
                gameFrame.style.width = '100%';
                gameFrame.style.height = '100%';
            }
        }

        // Переключение на весь экран (Telegram попробует)
        window.toggleFullscreen = () => {
            tg.HapticFeedback.impactOccurred('light');
            tg.expand(); // Просим Telegram расшириться
        };

        window.goBack = () => {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = `game.html?id=${gameId}`;
        };

        // Когда iframe загрузился
        gameFrame.onload = () => {
            loader.style.display = 'none';
            tg.HapticFeedback.notificationOccurred('success');
        };

        gameFrame.onerror = () => {
            loader.style.display = 'none';
            errorOverlay.style.display = 'flex';
            tg.HapticFeedback.notificationOccurred('error');
        };

        // Применяем тему
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a1a1a');
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#222222');
            style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
            style.setProperty('--tg-theme-section-separator-color', tg.themeParams.section_separator_color || '#333333');
        }

        // Старт
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
        loadGameData();
    </script>
</body>
</html>
