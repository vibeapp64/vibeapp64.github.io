<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeApp | Запуск</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Контейнер для игры - ВЕСЬ ЭКРАН */
        .game-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Iframe игры */
        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
            transition: transform 0.3s ease;
        }

        /* Портретный режим - без трансформаций, просто центрируем */
        .game-frame.portrait {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Ландшафтный режим - поворачиваем */
        .game-frame.landscape {
            width: 100vh;
            height: 100vw;
            transform: rotate(90deg) translateY(-100%);
            transform-origin: left top;
            object-fit: cover;
        }

        /* Исправление для ландшафта */
        .landscape-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* Рекламный оверлей - в стиле сторис */
        .ad-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        /* Прогресс-бар */
        .ad-progress {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 1002;
        }

        .ad-progress-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #40a7e3);
            width: 0%;
            transition: width 1s linear;
        }

        /* Контент рекламы */
        .ad-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            justify-content: center;
            gap: 20px;
        }

        .ad-media {
            flex: 1;
            min-height: 300px;
            border-radius: 30px;
            overflow: hidden;
            background: var(--tg-theme-secondary-bg-color, #222);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .ad-media img, .ad-media video, .ad-media iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        .ad-media iframe {
            min-height: 400px;
        }

        .ad-title {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin: 20px 0 10px;
        }

        .ad-button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 18px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 20px rgba(64, 167, 227, 0.4);
        }

        .ad-button:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .ad-button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .ad-timer {
            text-align: center;
            color: var(--tg-theme-hint-color, #999);
            font-size: 14px;
            margin-top: 10px;
        }

        .close-button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1003;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .close-button:active {
            opacity: 0.7;
        }

        /* Скрытые элементы */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Контейнер для игры -->
    <div class="game-container">
        <iframe class="game-frame" id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen"></iframe>
    </div>

    <!-- Рекламный оверлей -->
    <div id="adOverlay" class="ad-overlay">
        <div class="ad-progress">
            <div class="ad-progress-fill" id="adProgress"></div>
        </div>
        
        <button class="close-button" id="closeAdBtn" disabled style="opacity: 0.5;">✕</button>

        <div class="ad-content" id="adContent">
            <!-- Сюда будет вставлен контент рекламы -->
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        
        // Настройки Telegram
        tg.expand();
        tg.disableVerticalSwipes();
        tg.ready();

        // Показываем кнопку "Назад" от Telegram
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            window.location.href = `game.html?id=${gameId}`;
        });

        // Получаем ID игры
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');

        if (!gameId) {
            window.location.href = 'index.html';
        }

        // Данные
        let currentGame = null;
        let currentAd = null;
        let adTimer = 10;
        let adInterval = null;
        let sessionStartTime = Date.now();
        let gameLoaded = false;

        // Элементы
        const gameFrame = document.getElementById('gameFrame');
        const adOverlay = document.getElementById('adOverlay');
        const adContent = document.getElementById('adContent');
        const adProgress = document.getElementById('adProgress');
        const closeAdBtn = document.getElementById('closeAdBtn');

        // ========== СТАТИСТИКА ==========
        function getStorageKey() {
            const username = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.id || 'anonymous';
            return `vibeapp_stats_${username}`;
        }

        function updateGameStats(gameId, sessionDuration) {
            const key = getStorageKey();
            let stats = {};
            
            try {
                stats = JSON.parse(localStorage.getItem(key)) || {};
            } catch (e) {
                stats = {};
            }

            if (!stats[gameId]) {
                stats[gameId] = {
                    playCount: 0,
                    totalTime: 0,
                    lastPlayed: null
                };
            }

            stats[gameId].playCount += 1;
            stats[gameId].totalTime += sessionDuration;
            stats[gameId].lastPlayed = new Date().toISOString();

            localStorage.setItem(key, JSON.stringify(stats));
            console.log('Статистика обновлена:', stats[gameId]);
        }

        // ========== ЗАГРУЗКА ИГРЫ ==========
        async function loadGameData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/games.json');
                const games = await response.json();
                const game = games.find(g => g.id == gameId);
                
                if (!game) throw new Error('Игра не найдена');
                
                currentGame = game;
                
                // Загружаем рекламу
                await loadRandomAd();
                
            } catch (error) {
                console.error('Ошибка:', error);
                tg.showAlert('Не удалось загрузить игру');
                window.location.href = 'index.html';
            }
        }

        // ========== ЗАГРУЗКА РЕКЛАМЫ ==========
        async function loadRandomAd() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/ads.json');
                const ads = await response.json();
                
                // Выбираем случайное объявление
                currentAd = ads[Math.floor(Math.random() * ads.length)];
                
                renderAd();
                startAdTimer();
                
            } catch (error) {
                console.error('Ошибка загрузки рекламы:', error);
                // Если реклама не загрузилась - пропускаем
                startGame();
            }
        }

        // ========== ОТОБРАЖЕНИЕ РЕКЛАМЫ ==========
        function renderAd() {
            let mediaHtml = '';
            
            switch(currentAd.type) {
                case 'image':
                    mediaHtml = `<img src="${currentAd.content}" alt="${currentAd.title}" style="width:100%; height:100%; object-fit:cover;">`;
                    break;
                case 'video':
                    mediaHtml = `
                        <video autoplay loop muted playsinline style="width:100%; height:100%; object-fit:cover;">
                            <source src="${currentAd.content}" type="video/mp4">
                        </video>
                    `;
                    break;
                case 'site':
                    mediaHtml = `<iframe src="${currentAd.content}" style="width:100%; height:100%; border:none;" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>`;
                    break;
                default:
                    mediaHtml = `<div style="padding:40px; text-align:center;">Реклама</div>`;
            }

            adContent.innerHTML = `
                <div class="ad-media" style="background: ${currentAd.backgroundColor || '#222'}">
                    ${mediaHtml}
                </div>
                <div class="ad-title">${currentAd.title}</div>
                <button class="ad-button" id="adActionBtn" onclick="handleAdAction()" disabled>${currentAd.buttonText} (10)</button>
                <div class="ad-timer">Реклама закроется через 10 секунд</div>
            `;

            // Устанавливаем цвет фона для оверлея
            if (currentAd.backgroundColor) {
                adOverlay.style.backgroundColor = currentAd.backgroundColor;
            }
        }

        // ========== ТАЙМЕР РЕКЛАМЫ ==========
        function startAdTimer() {
            let secondsLeft = 10;
            adProgress.style.width = '0%';
            
            adInterval = setInterval(() => {
                secondsLeft -= 1;
                const percent = ((10 - secondsLeft) / 10) * 100;
                adProgress.style.width = percent + '%';
                
                const adButton = document.getElementById('adActionBtn');
                if (adButton) {
                    adButton.textContent = `${currentAd.buttonText} (${secondsLeft})`;
                }
                
                if (secondsLeft <= 0) {
                    clearInterval(adInterval);
                    enableAdClose();
                }
            }, 1000);
        }

        // ========== РАЗРЕШИТЬ ЗАКРЫТИЕ РЕКЛАМЫ ==========
        function enableAdClose() {
            const adButton = document.getElementById('adActionBtn');
            if (adButton) {
                adButton.disabled = false;
                adButton.textContent = currentAd.buttonText;
            }
            
            closeAdBtn.disabled = false;
            closeAdBtn.style.opacity = '1';
            
            tg.HapticFeedback.notificationOccurred('success');
        }

        // ========== ДЕЙСТВИЕ ПО КНОПКЕ РЕКЛАМЫ ==========
        window.handleAdAction = () => {
            if (currentAd.buttonLink) {
                tg.openLink(currentAd.buttonLink);
            }
        };

        // ========== ЗАКРЫТЬ РЕКЛАМУ ==========
        window.closeAd = () => {
            if (closeAdBtn.disabled) return;
            
            clearInterval(adInterval);
            adOverlay.classList.add('hidden');
            
            // Запускаем игру
            startGame();
        };

        closeAdBtn.addEventListener('click', window.closeAd);

        // ========== ЗАПУСК ИГРЫ ==========
        function startGame() {
            // Устанавливаем ориентацию iframe
            applyOrientation(currentGame.orientation);
            
            // Загружаем игру
            gameFrame.src = currentGame.gameUrl;
            
            // Сохраняем время начала сессии
            sessionStartTime = Date.now();
            
            tg.HapticFeedback.impactOccurred('medium');
        }

        // ========== ПРИМЕНЕНИЕ ОРИЕНТАЦИИ (ИСПРАВЛЕНО!) ==========
        function applyOrientation(orientation) {
            // Убираем все классы
            gameFrame.classList.remove('portrait', 'landscape');
            
            if (orientation === 'landscape') {
                // Для ландшафтных игр - поворачиваем и центрируем
                gameFrame.classList.add('landscape');
                
                // Дополнительная корректировка через transform
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                if (isIOS) {
                    // Специальная обработка для iOS
                    gameFrame.style.transform = 'rotate(90deg) translateY(-100%)';
                } else {
                    gameFrame.style.transform = 'rotate(90deg) translateY(-100%)';
                }
                
                gameFrame.style.width = '100vh';
                gameFrame.style.height = '100vw';
            } else {
                // Для портретных - просто на весь экран
                gameFrame.classList.add('portrait');
                gameFrame.style.transform = 'none';
                gameFrame.style.width = '100%';
                gameFrame.style.height = '100%';
            }
        }

        // ========== СОХРАНЕНИЕ СТАТИСТИКИ ПРИ ВЫХОДЕ ==========
        window.addEventListener('beforeunload', () => {
            if (currentGame && sessionStartTime) {
                const sessionDuration = Math.round((Date.now() - sessionStartTime) / 1000); // в секундах
                updateGameStats(currentGame.id, sessionDuration);
            }
        });

        // ========== ЗАГРУЗКА ПРИ СТАРТЕ ==========
        loadGameData();

        // ========== ТЕМА TELEGRAM ==========
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a1a1a');
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#222222');
            style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
        }

        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
    </script>
</body>
</html>
