<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeApp | Запуск</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Контейнер для игры */
        .game-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            transition: opacity 0.3s ease;
        }

        /* Лоадер */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--tg-theme-bg-color, #1a1a1a);
            z-index: 100;
            gap: 20px;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-secondary-bg-color, #333);
            border-top-color: var(--tg-theme-button-color, #40a7e3);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            color: var(--tg-theme-hint-color, #999);
            font-size: 16px;
        }

        /* Ошибка */
        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .error-card {
            background: var(--tg-theme-secondary-bg-color, #222);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <iframe class="game-frame" id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-orientation-lock" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen"></iframe>
    </div>

    <div class="loader-container" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Загружаем игру...</div>
    </div>

    <div id="errorOverlay" style="display: none;" class="error-overlay">
        <div class="error-card">
            <div style="font-size: 48px; margin-bottom: 20px;">😵</div>
            <div style="font-size: 18px; margin-bottom: 20px;">Не удалось загрузить игру</div>
            <button class="telegram-button" onclick="goBack()" style="padding: 12px 24px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 30px; font-size: 16px; font-weight: 600;">Вернуться</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.disableVerticalSwipes();
        
        // Показываем нативную кнопку "Назад"
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = `game.html?id=${gameId}`;
        });

        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');
        
        const gameFrame = document.getElementById('gameFrame');
        const loader = document.getElementById('loader');
        const errorOverlay = document.getElementById('errorOverlay');

        let currentGame = null;
        let sessionStartTime = Date.now();
        let adShown = false;

        if (!gameId) {
            window.location.href = 'index.html';
        }

        // ========== СТАТИСТИКА ==========
        function getStatsKey() {
            const user = tg.initDataUnsafe?.user;
            const username = user?.username || user?.id || 'anonymous';
            return `vibeapp_stats_${username}`;
        }

        function loadStats() {
            try {
                const stats = localStorage.getItem(getStatsKey());
                return stats ? JSON.parse(stats) : { launches: 0, totalTime: 0, lastSessionTime: 0 };
            } catch (e) {
                return { launches: 0, totalTime: 0, lastSessionTime: 0 };
            }
        }

        function saveStats(launch = false) {
            try {
                const stats = loadStats();
                if (launch) {
                    stats.launches += 1;
                }
                const sessionTime = Math.floor((Date.now() - sessionStartTime) / 1000);
                stats.totalTime += sessionTime;
                stats.lastSessionTime = sessionTime;
                localStorage.setItem(getStatsKey(), JSON.stringify(stats));
                
                console.log('📊 Статистика обновлена:', stats);
            } catch (e) {
                console.log('Ошибка сохранения статистики:', e);
            }
        }

        // Сохраняем время при выходе
        window.addEventListener('beforeunload', () => saveStats());

        // ========== ЗАГРУЗКА ИГРЫ ==========
        async function loadGameData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/games.json');
                const games = await response.json();
                const game = games.find(g => g.id == gameId);
                
                if (!game) throw new Error('Игра не найдена');
                
                currentGame = game;
                
                // Сохраняем запуск в статистику
                saveStats(true);
                
                // Сначала показываем рекламу
                await showAd();
                
                // Затем загружаем игру
                loadGame(game);
                
            } catch (error) {
                console.error('Ошибка:', error);
                loader.style.display = 'none';
                errorOverlay.style.display = 'flex';
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // ========== РЕКЛАМА ==========
        async function showAd() {
            if (adShown) return;
            
            try {
                // Загружаем список рекламы
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/ads.json');
                const ads = await response.json();
                
                // Выбираем случайное объявление
                const randomAd = ads[Math.floor(Math.random() * ads.length)];
                
                // Показываем рекламу в новом окне (как модалку)
                const adWindow = window.open('', '_blank', 'width=400,height=700');
                if (adWindow) {
                    adWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
                            <title>Реклама</title>
                            <style>
                                * { margin:0; padding:0; box-sizing:border-box; }
                                body { 
                                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                                    background: ${randomAd.backgroundColor || '#000'};
                                    color: white;
                                    min-height: 100dvh;
                                    display: flex;
                                    flex-direction: column;
                                    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
                                }
                                .ad-container {
                                    flex: 1;
                                    display: flex;
                                    flex-direction: column;
                                    align-items: center;
                                    justify-content: center;
                                    padding: 20px;
                                }
                                .ad-content {
                                    width: 100%;
                                    max-width: 400px;
                                    border-radius: 30px;
                                    overflow: hidden;
                                    margin-bottom: 20px;
                                    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
                                }
                                .ad-image, .ad-video {
                                    width: 100%;
                                    height: auto;
                                    display: block;
                                }
                                .ad-site-frame {
                                    width: 100%;
                                    height: 500px;
                                    border: none;
                                    background: white;
                                }
                                .ad-title {
                                    font-size: 24px;
                                    font-weight: 700;
                                    margin-bottom: 16px;
                                    text-align: center;
                                }
                                .ad-button {
                                    background: var(--tg-theme-button-color, #40a7e3);
                                    color: var(--tg-theme-button-text-color, white);
                                    border: none;
                                    padding: 16px 40px;
                                    border-radius: 40px;
                                    font-size: 18px;
                                    font-weight: 700;
                                    margin-bottom: 20px;
                                    cursor: pointer;
                                    box-shadow: 0 10px 20px rgba(64,167,227,0.4);
                                }
                                .close-button {
                                    background: rgba(255,255,255,0.2);
                                    color: white;
                                    border: none;
                                    padding: 12px 30px;
                                    border-radius: 30px;
                                    font-size: 16px;
                                    backdrop-filter: blur(10px);
                                    opacity: 0.5;
                                    pointer-events: none;
                                    transition: opacity 0.3s;
                                }
                                .close-button.active {
                                    opacity: 1;
                                    pointer-events: auto;
                                    cursor: pointer;
                                }
                                .timer {
                                    font-size: 14px;
                                    color: rgba(255,255,255,0.6);
                                    margin-top: 10px;
                                }
                            </style>
                        </head>
                        <body>
                            <div class="ad-container">
                                <div class="ad-content">
                                    ${randomAd.type === 'image' ? `<img class="ad-image" src="${randomAd.content}" alt="ad">` : ''}
                                    ${randomAd.type === 'video' ? `<video class="ad-video" src="${randomAd.content}" autoplay loop muted playsinline></video>` : ''}
                                    ${randomAd.type === 'site' ? `<iframe class="ad-site-frame" src="${randomAd.content}" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>` : ''}
                                </div>
                                <div class="ad-title">${randomAd.title}</div>
                                <button class="ad-button" onclick="openLink('${randomAd.buttonLink}')">${randomAd.buttonText}</button>
                                <button class="close-button" id="closeBtn" onclick="closeAd()">Закрыть</button>
                                <div class="timer" id="timer">10 секунд</div>
                            </div>
                            <script>
                                let seconds = 10;
                                const closeBtn = document.getElementById('closeBtn');
                                const timerEl = document.getElementById('timer');
                                
                                const interval = setInterval(() => {
                                    seconds--;
                                    timerEl.textContent = seconds + ' секунд';
                                    if (seconds <= 0) {
                                        clearInterval(interval);
                                        closeBtn.classList.add('active');
                                        timerEl.style.opacity = '0';
                                    }
                                }, 1000);
                                
                                window.openLink = (link) => {
                                    window.open(link, '_blank');
                                };
                                
                                window.closeAd = () => {
                                    if (seconds <= 0) {
                                        window.close();
                                    }
                                };
                            <\/script>
                        </body>
                        </html>
                    `);
                    
                    // Ждём закрытия рекламного окна
                    await new Promise(resolve => {
                        const checkClosed = setInterval(() => {
                            if (adWindow.closed) {
                                clearInterval(checkClosed);
                                resolve();
                            }
                        }, 500);
                    });
                    
                    adShown = true;
                } else {
                    // Если блокировщик всплывающих окон, просто продолжаем
                    console.log('Не удалось открыть окно с рекламой');
                }
            } catch (error) {
                console.error('Ошибка загрузки рекламы:', error);
            }
        }

        // ========== ЗАГРУЗКА ИГРЫ ==========
        function loadGame(game) {
            // Применяем ориентацию
            applyOrientation(game.orientation);
            
            // Загружаем игру в iframe
            gameFrame.src = game.gameUrl;
            
            // Скрываем лоадер
            setTimeout(() => {
                loader.style.display = 'none';
            }, 2000);
        }

        // Применение ориентации
        function applyOrientation(orientation) {
            const container = document.getElementById('gameContainer');
            
            // Сбрасываем стили
            container.style.alignItems = 'center';
            container.style.justifyContent = 'center';
            
            if (orientation === 'landscape') {
                // Для ландшафтных игр поворачиваем контейнер
                container.style.transform = 'rotate(90deg)';
                container.style.width = '100vh';
                container.style.height = '100vw';
                container.style.position = 'absolute';
                container.style.top = '50%';
                container.style.left = '50%';
                container.style.transform = 'translate(-50%, -50%) rotate(90deg)';
            } else {
                // Для портретных - нормально
                container.style.transform = 'none';
                container.style.width = '100%';
                container.style.height = '100%';
                container.style.position = 'relative';
                container.style.top = 'auto';
                container.style.left = 'auto';
            }
        }

        window.goBack = () => {
            window.location.href = `game.html?id=${gameId}`;
        };

        // Когда iframe загрузился
        gameFrame.onload = () => {
            loader.style.display = 'none';
            tg.HapticFeedback.notificationOccurred('success');
        };

        gameFrame.onerror = () => {
            loader.style.display = 'none';
            errorOverlay.style.display = 'flex';
            tg.HapticFeedback.notificationOccurred('error');
        };

        // Применяем тему
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a1a1a');
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#222222');
            style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
        }

        // Старт
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
        loadGameData();
    </script>
</body>
</html>
