<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeApp | Запуск игры</title>
    <style>
        /* --- БАЗОВЫЕ СТИЛИ (минимум, так как здесь только iframe) --- */
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --button-color: var(--tg-theme-button-color, #40a7e3);
            --text-color: var(--tg-theme-text-color, #000000);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Контейнер для iframe с поддержкой поворота */
        .iframe-container {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            transition: all 0.3s ease;
        }

        /* Стили для iframe */
        .game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white; /* Фон для игр, может быть белым */
            transition: transform 0.3s ease;
        }

        /* Класс для вертикальной ориентации (поворот экрана) */
        .iframe-container.portrait-mode {
            background: var(--bg-color);
        }
        .iframe-container.portrait-mode .game-iframe {
            width: 100vh; /* Меняем ширину и высоту для вертикального режима */
            height: 100vw;
            transform: rotate(-90deg) translateX(-100%);
            transform-origin: top left;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Верхняя панель с кнопкой "Назад" */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-color);
            border-bottom: 1px solid rgba(128, 128, 128, 0.2);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .back-button {
            background: none;
            border: none;
            color: var(--button-color);
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px 0 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .game-title-small {
            flex: 1;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 40px; /* место для кнопки */
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--hint-color, #999);
        }
    </style>
</head>
<body>
    <!-- Верхняя панель с кнопкой назад -->
    <div class="top-bar">
        <button class="back-button" onclick="goBack()">← <span style="font-size:16px;">Назад</span></button>
        <div class="game-title-small" id="gameTitle">Загрузка...</div>
    </div>

    <!-- Контейнер для iframe -->
    <div class="iframe-container" id="iframeContainer">
        <div class="loading" id="loadingMessage">Запуск игры...</div>
        <iframe class="game-iframe" id="gameIframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen"></iframe>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // --- TELEGRAM ИНИЦИАЛИЗАЦИЯ ---
        const tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на весь экран
        tg.disableVerticalSwipes();
        tg.ready();

        // Применяем тему Telegram
        function applyTelegramTheme() {
            const style = document.documentElement.style;
            style.setProperty('--bg-color', tg.themeParams.bg_color || '#ffffff');
            style.setProperty('--button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--text-color', tg.themeParams.text_color || '#000000');
        }
        applyTelegramTheme();
        tg.onEvent('themeChanged', applyTelegramTheme);

        // --- ПОЛУЧЕНИЕ ID И ОРИЕНТАЦИИ ---
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');
        // Пытаемся получить ориентацию из sessionStorage (установлена в game.html)
        let gameOrientation = sessionStorage.getItem('gameOrientation') || 'landscape'; // по умолчанию горизонтальная
        let gameTitle = '';

        // --- ЗАГРУЗКА ДАННЫХ ИГРЫ ДЛЯ ПОЛУЧЕНИЯ URL ---
        async function loadAndOpenGame() {
            if (!gameId) {
                document.getElementById('loadingMessage').textContent = 'Ошибка: ID игры не указан';
                return;
            }

            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/games.json');
                const games = await response.json();
                const game = games.find(g => g.id == gameId);

                if (!game) {
                    document.getElementById('loadingMessage').textContent = 'Игра не найдена';
                    return;
                }

                // Сохраняем название для отображения
                gameTitle = game.title;
                document.getElementById('gameTitle').textContent = game.title;
                
                // Устанавливаем iframe src
                const iframe = document.getElementById('gameIframe');
                iframe.src = game.gameUrl;
                
                // Применяем ориентацию из данных игры (приоритетнее, чем из sessionStorage)
                gameOrientation = game.orientation || 'landscape';
                applyOrientation(gameOrientation);
                
                // Скрываем сообщение о загрузке
                document.getElementById('loadingMessage').style.display = 'none';
                
                // Показываем iframe (он был скрыт по умолчанию через CSS? нет, показываем)
                iframe.style.display = 'block'; // или он уже виден
                
                // Отправляем событие в Telegram, что контент загружен
                tg.ready();
                
            } catch (error) {
                console.error('Ошибка загрузки игры:', error);
                document.getElementById('loadingMessage').textContent = 'Ошибка загрузки';
            }
        }

        // --- ФУНКЦИЯ ПОВОРОТА IFRAME ---
        function applyOrientation(orientation) {
            const container = document.getElementById('iframeContainer');
            if (orientation === 'portrait') {
                container.classList.add('portrait-mode');
                // Для вертикальных игр также можно попробовать изменить мета-вьюпорт, но это не всегда помогает
                // В основном полагаемся на CSS поворот
            } else {
                container.classList.remove('portrait-mode');
            }
            
            // Сообщаем Telegram об ориентации (для полноэкранного режима)
            try {
                if (orientation === 'portrait') {
                    // Telegram пока не поддерживает принудительный поворот, но мы делаем через CSS
                }
            } catch (e) {}
        }

        // --- НАВИГАЦИЯ НАЗАД ---
        window.goBack = () => {
            tg.HapticFeedback.impactOccurred('light');
            // Возвращаемся на страницу информации, если есть история, иначе на главную
            if (document.referrer && document.referrer.includes('game.html')) {
                history.back();
            } else {
                window.location.href = `game.html?id=${gameId}`;
            }
        };

        // --- ОБРАБОТКА ИЗМЕНЕНИЯ РАЗМЕРА ОКНА (НА СЛУЧАЙ ПОВОРОТА ТЕЛЕФОНА) ---
        window.addEventListener('resize', () => {
            // Переприменяем ориентацию, чтобы скорректировать размеры
            applyOrientation(gameOrientation);
        });

        // --- ЗАПУСК ---
        loadAndOpenGame();

        // Дополнительно: скрываем основную кнопку Telegram, если она вдруг появится
        tg.MainButton.hide();
    </script>
</body>
</html>
