<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeApp | Запуск</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Основной контейнер с учётом safe area */
        .game-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            width: 100%;
            height: 100%;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Iframe с правильной ориентацией */
        .game-frame {
            border: none;
            background: #000;
            transition: all 0.3s ease;
        }

        /* Лоадер */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--tg-theme-bg-color, #1a1a1a);
            z-index: 1000;
            gap: 20px;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-secondary-bg-color, #333);
            border-top-color: var(--tg-theme-button-color, #40a7e3);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            color: var(--tg-theme-hint-color, #999);
            font-size: 16px;
        }

        /* Сообщение об ошибке */
        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .error-card {
            background: var(--tg-theme-secondary-bg-color, #222);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }

        .error-card button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <iframe class="game-frame" id="gameFrame" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-orientation-lock" 
            allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen; screen-wake-lock; xr-spatial-tracking">
        </iframe>
    </div>

    <div class="loader-container" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Загружаем игру...</div>
    </div>

    <div id="errorOverlay" style="display: none;" class="error-overlay">
        <div class="error-card">
            <div style="font-size: 48px; margin-bottom: 20px;">😵</div>
            <div style="font-size: 18px; margin-bottom: 20px;">Не удалось загрузить игру</div>
            <button onclick="goBack()">Вернуться</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        
        // Настройка приложения
        tg.expand();
        tg.disableVerticalSwipes();
        tg.enableClosingConfirmation(); // Подтверждение при закрытии
        
        // Настраиваем кнопку "Назад" Telegram
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            window.location.href = `game.html?id=${gameId}`;
        });
        
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');
        
        const gameFrame = document.getElementById('gameFrame');
        const loader = document.getElementById('loader');
        const gameContainer = document.getElementById('gameContainer');
        const errorOverlay = document.getElementById('errorOverlay');

        let currentGame = null;
        let sessionStartTime = Date.now();
        let username = 'anonymous';

        if (!gameId) {
            window.location.href = 'index.html';
        }

        // Получаем username пользователя
        const user = tg.initDataUnsafe?.user;
        if (user?.username) {
            username = user.username;
        } else if (user?.id) {
            username = `user_${user.id}`;
        }

        // Функция для обновления статистики
        function updateGameStats(gameId, username) {
            const storageKey = `vibeapp_stats_${username}`;
            const now = Date.now();
            
            let stats = {};
            try {
                const saved = localStorage.getItem(storageKey);
                if (saved) {
                    stats = JSON.parse(saved);
                }
            } catch (e) {
                console.log('Storage error:', e);
            }

            if (!stats[gameId]) {
                stats[gameId] = {
                    launches: 0,
                    totalTime: 0,
                    lastLaunch: null,
                    totalSessions: 0
                };
            }

            stats[gameId].launches++;
            stats[gameId].lastLaunch = now;
            stats[gameId].totalSessions++;

            // Сохраняем время начала сессии для последующего расчёта
            sessionStartTime = now;

            try {
                localStorage.setItem(storageKey, JSON.stringify(stats));
            } catch (e) {
                console.log('Storage error:', e);
            }

            console.log(`Статистика для @${username}:`, stats[gameId]);
        }

        // Функция для обновления времени в статистике
        function updateTimeStats(gameId, username) {
            const storageKey = `vibeapp_stats_${username}`;
            const now = Date.now();
            const sessionTime = Math.floor((now - sessionStartTime) / 1000); // в секундах

            try {
                const saved = localStorage.getItem(storageKey);
                if (saved) {
                    const stats = JSON.parse(saved);
                    if (stats[gameId]) {
                        stats[gameId].totalTime += sessionTime;
                        localStorage.setItem(storageKey, JSON.stringify(stats));
                        console.log(`Время в игре ${gameId}: +${sessionTime}с`);
                    }
                }
            } catch (e) {
                console.log('Storage error:', e);
            }
        }

        // Загрузка данных игры
        async function loadGameData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/games.json');
                const games = await response.json();
                const game = games.find(g => g.id == gameId);
                
                if (!game) throw new Error('Игра не найдена');
                
                currentGame = game;
                
                // Записываем запуск в статистику
                updateGameStats(gameId, username);
                
                // Сначала показываем рекламу, потом игру
                showAdThenGame(game);
                
            } catch (error) {
                console.error('Ошибка:', error);
                loader.style.display = 'none';
                errorOverlay.style.display = 'flex';
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Показ рекламы перед игрой
        function showAdThenGame(game) {
            // Генерируем случайный ID для рекламы (1-3, т.к. в вашем примере 3 рекламы)
            const randomAdId = Math.floor(Math.random() * 3) + 1;
            
            // Перенаправляем на страницу с рекламой, передавая ID игры и рекламы
            window.location.href = `ad.html?gameId=${game.id}&adId=${randomAdId}`;
        }

        // Загрузка игры (будет вызвана из ad.html после рекламы)
        window.loadGame = function() {
            if (!currentGame) return;
            
            // Применяем правильную ориентацию
            applyOrientation(currentGame.orientation);
            
            // Загружаем игру в iframe
            gameFrame.src = currentGame.gameUrl;
            
            // Скрываем лоадер через 1.5 секунды или при загрузке iframe
            setTimeout(() => {
                loader.style.display = 'none';
            }, 1500);
        };

        // Применение ориентации - ИСПРАВЛЕНО!
        function applyOrientation(orientation) {
            const container = gameContainer;
            const frame = gameFrame;
            
            // Сбрасываем все стили
            frame.style.transform = 'none';
            frame.style.width = '';
            frame.style.height = '';
            container.style.alignItems = 'center';
            container.style.justifyContent = 'center';
            
            // Получаем размеры контейнера с учётом safe area
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            if (orientation === 'landscape') {
                // Для горизонтальных игр - ширина на всю высоту контейнера
                frame.style.width = containerHeight + 'px';
                frame.style.height = containerWidth + 'px';
                frame.style.transform = 'rotate(90deg)';
                
                console.log('Landscape mode applied');
            } else {
                // Для вертикальных игр - обычный режим
                frame.style.width = '100%';
                frame.style.height = '100%';
                
                console.log('Portrait mode applied');
            }
        }

        window.goBack = () => {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = `game.html?id=${gameId}`;
        };

        // Когда iframe загрузился
        gameFrame.onload = () => {
            loader.style.display = 'none';
            tg.HapticFeedback.notificationOccurred('success');
        };

        gameFrame.onerror = () => {
            loader.style.display = 'none';
            errorOverlay.style.display = 'flex';
            tg.HapticFeedback.notificationOccurred('error');
        };

        // Сохраняем время при закрытии/уходе со страницы
        window.addEventListener('beforeunload', () => {
            if (currentGame) {
                updateTimeStats(currentGame.id, username);
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && currentGame) {
                updateTimeStats(currentGame.id, username);
                sessionStartTime = Date.now(); // Сбрасываем для следующей сессии
            }
        });

        // Применяем тему
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a1a1a');
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#222222');
            style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
        }

        // Старт
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
        loadGameData();
    </script>
</body>
</html>
