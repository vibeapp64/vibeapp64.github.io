<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeApp | Игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Игровой контейнер на весь экран */
        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }

        /* Iframe игры */
        .game-frame {
            border: none;
            background: #000;
            transition: transform 0.2s ease;
        }

        /* Лоадер */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--tg-theme-bg-color, #1a1a1a);
            z-index: 1000;
            gap: 20px;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-secondary-bg-color, #333);
            border-top-color: var(--tg-theme-button-color, #40a7e3);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            color: var(--tg-theme-hint-color, #999);
            font-size: 16px;
        }

        /* Ошибка */
        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            padding: 20px;
        }

        .error-card {
            background: var(--tg-theme-secondary-bg-color, #222);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 300px;
            color: var(--tg-theme-text-color);
        }

        .error-card button {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 14px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <iframe class="game-frame" id="gameFrame" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-orientation-lock"
            allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen; web-share">
        </iframe>
    </div>

    <div class="loader-overlay" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Загружаем игру...</div>
    </div>

    <div id="errorOverlay" class="error-overlay" style="display: none;">
        <div class="error-card">
            <div style="font-size: 48px; margin-bottom: 20px;">😵</div>
            <div style="font-size: 18px; margin-bottom: 20px;">Не удалось загрузить игру</div>
            <button onclick="goBack()">Вернуться в магазин</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== ИНИЦИАЛИЗАЦИЯ TELEGRAM ====================
        const tg = window.Telegram.WebApp;
        
        // Настраиваем приложение на полный экран
        tg.expand(); // Растягиваем на весь экран
        tg.disableVerticalSwipes(); // Отключаем свайпы
        
        // Показываем нативную кнопку "Назад"
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            // Сохраняем статистику перед выходом
            savePlayTime();
            window.location.href = `game.html?id=${gameId}`;
        });
        
        tg.ready();

        // ==================== ПОЛУЧАЕМ ID ИГРЫ ====================
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');

        if (!gameId) {
            window.location.href = 'index.html';
        }

        // ==================== ЭЛЕМЕНТЫ ====================
        const gameFrame = document.getElementById('gameFrame');
        const loader = document.getElementById('loader');
        const errorOverlay = document.getElementById('errorOverlay');

        // ==================== СТАТИСТИКА ====================
        const user = tg.initDataUnsafe?.user;
        const username = user?.username || user?.id || 'anonymous';
        const storageKey = `vibeapp_stats_${username}_${gameId}`;
        
        let gameStartTime = Date.now();
        let currentGame = null;

        // Загружаем статистику
        function loadStats() {
            try {
                const stats = localStorage.getItem(storageKey);
                return stats ? JSON.parse(stats) : { playCount: 0, totalPlayTime: 0 };
            } catch (e) {
                console.log('Stats error:', e);
                return { playCount: 0, totalPlayTime: 0 };
            }
        }

        // Сохраняем статистику
        function savePlayTime() {
            try {
                const playTime = Math.floor((Date.now() - gameStartTime) / 1000); // в секундах
                if (playTime < 1) return; // Игнорируем если меньше секунды

                const stats = loadStats();
                stats.playCount += 1;
                stats.totalPlayTime += playTime;
                stats.lastPlayed = Date.now();
                
                localStorage.setItem(storageKey, JSON.stringify(stats));
                console.log('Статистика сохранена:', stats);
            } catch (e) {
                console.log('Save error:', e);
            }
        }

        // Сохраняем при выходе
        window.addEventListener('beforeunload', () => {
            savePlayTime();
        });

        // ==================== ЗАГРУЗКА ИГРЫ ====================
        async function loadGame() {
            try {
                // Сначала показываем рекламу (если нужно)
                const showAd = Math.random() < 0.5; // 50% показов для теста
                
                if (showAd) {
                    // Переходим на рекламу, а потом вернёмся сюда
                    sessionStorage.setItem('returnToGame', gameId);
                    window.location.href = 'ad.html';
                    return;
                }

                // Загружаем данные игры
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/games.json');
                const games = await response.json();
                const game = games.find(g => g.id == gameId);

                if (!game) throw new Error('Игра не найдена');

                currentGame = game;
                
                // Применяем ориентацию
                applyOrientation(game.orientation);
                
                // Загружаем игру
                gameFrame.src = game.gameUrl;
                
                // Таймаут на лоадер
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 2000);

                // Обновляем статистику при старте
                const stats = loadStats();
                console.log('Статистика игры:', stats);

            } catch (error) {
                console.error('Ошибка:', error);
                loader.style.display = 'none';
                errorOverlay.style.display = 'flex';
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // ==================== ОРИЕНТАЦИЯ (ИСПРАВЛЕНО) ====================
        function applyOrientation(orientation) {
            const container = document.getElementById('gameContainer');
            
            // Сбрасываем стили
            gameFrame.style.transform = 'none';
            gameFrame.style.width = '100%';
            gameFrame.style.height = '100%';
            gameFrame.style.maxWidth = 'none';
            gameFrame.style.maxHeight = 'none';

            if (orientation === 'landscape') {
                // Для ландшафтных игр поворачиваем на 90°
                gameFrame.style.width = '100vh';  // Меняем местами ширину и высоту
                gameFrame.style.height = '100vw';
                gameFrame.style.transform = 'rotate(90deg)';
            } else {
                // Для портретных — всё нормально
                gameFrame.style.width = '100%';
                gameFrame.style.height = '100%';
                gameFrame.style.transform = 'none';
            }
        }

        // ==================== СОБЫТИЯ ====================
        gameFrame.onload = () => {
            loader.style.display = 'none';
            tg.HapticFeedback.notificationOccurred('success');
            
            // Обновляем статистику (заход в игру)
            const stats = loadStats();
            stats.playCount += 0; // Увеличим при сохранении
            gameStartTime = Date.now(); // Сбрасываем таймер
        };

        gameFrame.onerror = () => {
            loader.style.display = 'none';
            errorOverlay.style.display = 'flex';
            tg.HapticFeedback.notificationOccurred('error');
        };

        // ==================== НАВИГАЦИЯ ====================
        window.goBack = () => {
            savePlayTime();
            window.location.href = `game.html?id=${gameId}`;
        };

        // ==================== ТЕМА ====================
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a1a1a');
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#222222');
            style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#ffffff');
            style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
        }

        // Проверяем, не вернулись ли с рекламы
        const returnToGame = sessionStorage.getItem('returnToGame');
        if (returnToGame && returnToGame == gameId) {
            sessionStorage.removeItem('returnToGame');
            // Продолжаем загрузку игры (без рекламы)
        }

        // Старт
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
        loadGame();
    </script>
</body>
</html>
