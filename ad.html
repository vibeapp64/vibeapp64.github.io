<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeApp | Реклама</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .ad-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Таймер */
        .timer-bar {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 30px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .timer-text {
            font-size: 18px;
            font-weight: 600;
        }

        .timer-seconds {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, white);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
        }

        /* Контент рекламы */
        .ad-content {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 30px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--tg-theme-section-separator-color);
        }

        .ad-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ad-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ad-site {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Заголовок рекламы */
        .ad-title {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-top: 10px;
        }

        /* Кнопки */
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 30px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, white);
        }

        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            border: 1px solid var(--tg-theme-section-separator-color);
        }

        .btn-disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .hidden {
            display: none;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color);
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="timer-bar">
            <span class="timer-text">⏳ Реклама</span>
            <span class="timer-seconds" id="timer">10с</span>
        </div>

        <div id="adContent">
            <div class="loader">Загрузка рекламы...</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Показываем кнопку назад (можно выйти с рекламы)
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            // Возвращаемся в магазин, пропуская рекламу
            window.location.href = 'index.html';
        });

        // Состояние
        let secondsLeft = 10;
        let adData = null;
        let timerInterval;

        // Элементы
        const timerEl = document.getElementById('timer');
        const adContent = document.getElementById('adContent');

        // Загрузка рекламы
        async function loadAd() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/ads.json');
                const ads = await response.json();
                
                // Случайная реклама
                const randomIndex = Math.floor(Math.random() * ads.length);
                adData = ads[randomIndex];
                
                renderAd(adData);
                startTimer();
                
            } catch (error) {
                console.error('Ошибка загрузки рекламы:', error);
                // Если реклама не загрузилась — пропускаем
                skipAd();
            }
        }

        // Отрисовка рекламы
        function renderAd(ad) {
            let contentHtml = '';

            switch(ad.type) {
                case 'image':
                    contentHtml = `<img class="ad-image" src="${ad.content}" alt="${ad.title}" loading="lazy">`;
                    break;
                case 'video':
                    contentHtml = `
                        <video class="ad-video" autoplay muted loop playsinline>
                            <source src="${ad.content}" type="video/mp4">
                        </video>
                    `;
                    break;
                case 'site':
                    contentHtml = `<iframe class="ad-site" src="${ad.content}" sandbox="allow-scripts allow-same-origin"></iframe>`;
                    break;
                default:
                    contentHtml = `<div style="padding: 40px; text-align: center;">Рекламный баннер</div>`;
            }

            adContent.innerHTML = `
                <div class="ad-content" style="background: ${ad.backgroundColor || 'var(--tg-theme-secondary-bg-color)'};">
                    ${contentHtml}
                </div>
                <div class="ad-title">${ad.title || ''}</div>
                <div class="actions">
                    <button class="btn btn-secondary" id="closeBtn" onclick="closeAd()" disabled>Закрыть (10)</button>
                    <a class="btn btn-primary" id="openBtn" href="${ad.buttonLink}" target="_blank" rel="noopener noreferrer" style="pointer-events: none; opacity: 0.5;">${ad.buttonText || 'Открыть'}</a>
                </div>
            `;
        }

        // Таймер
        function startTimer() {
            timerInterval = setInterval(() => {
                secondsLeft--;
                timerEl.textContent = secondsLeft + 'с';
                
                const closeBtn = document.getElementById('closeBtn');
                const openBtn = document.getElementById('openBtn');
                
                if (closeBtn && openBtn) {
                    if (secondsLeft <= 0) {
                        // Разблокируем кнопки
                        closeBtn.disabled = false;
                        closeBtn.textContent = 'Закрыть';
                        openBtn.style.pointerEvents = 'auto';
                        openBtn.style.opacity = '1';
                        
                        clearInterval(timerInterval);
                        tg.HapticFeedback.notificationOccurred('success');
                    } else {
                        closeBtn.textContent = `Закрыть (${secondsLeft})`;
                    }
                }
            }, 1000);
        }

        // Закрыть рекламу и перейти к игре
        window.closeAd = () => {
            const gameId = sessionStorage.getItem('returnToGame');
            if (gameId) {
                sessionStorage.removeItem('returnToGame');
                window.location.href = `open.html?id=${gameId}`;
            } else {
                window.location.href = 'index.html';
            }
        };

        // Пропуск рекламы (если ошибка)
        function skipAd() {
            const gameId = sessionStorage.getItem('returnToGame');
            if (gameId) {
                sessionStorage.removeItem('returnToGame');
                window.location.href = `open.html?id=${gameId}`;
            } else {
                window.location.href = 'index.html';
            }
        }

        // Применяем тему
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
            style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f0f0f0');
        }

        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
        
        // Запуск
        loadAd();
    </script>
</body>
</html>
