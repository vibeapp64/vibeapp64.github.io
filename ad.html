<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeApp | Реклама</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Контейнер рекламы в стиле Stories */
        .ad-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--ad-bg, #1a1a1a);
            position: relative;
            width: 100%;
            height: 100%;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Прогресс-бар */
        .progress-bar {
            position: absolute;
            top: env(safe-area-inset-top, 10px);
            left: 16px;
            right: 16px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
            z-index: 100;
        }

        .progress-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #40a7e3);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        /* Время */
        .timer {
            position: absolute;
            top: calc(env(safe-area-inset-top, 10px) + 14px);
            right: 16px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Кнопка закрытия (активна после таймера) */
        .close-button {
            position: absolute;
            top: calc(env(safe-area-inset-top, 10px) + 14px);
            left: 16px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .close-button.active {
            opacity: 1;
            pointer-events: auto;
            background: var(--tg-theme-button-color, #40a7e3);
        }

        .close-button:active {
            transform: scale(0.96);
        }

        /* Контент рекламы */
        .ad-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Для изображений */
        .ad-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Для видео */
        .ad-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Для сайта (iframe) */
        .ad-site {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: white;
        }

        /* Нижняя панель */
        .ad-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 16px calc(env(safe-area-inset-bottom, 0) + 20px);
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .ad-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .ad-button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 16px 24px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .ad-button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Счётчик */
        .counter {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        /* Лоадер */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--tg-theme-bg-color);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="ad-container" id="adContainer">
        <!-- Прогресс бар -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <!-- Таймер -->
        <div class="timer" id="timer">10с</div>
        
        <!-- Кнопка закрытия -->
        <div class="close-button" id="closeBtn" onclick="skipAd()">✕ Пропустить</div>
        
        <!-- Контент будет вставлен сюда -->
        <div id="adContent" class="ad-content"></div>
        
        <!-- Нижняя панель -->
        <div class="ad-footer">
            <div class="ad-title" id="adTitle">Загрузка...</div>
            <button class="ad-button" id="adButton" onclick="handleAdButton()">Открыть</button>
            <div class="counter" id="adCounter">Реклама · 1/1</div>
        </div>
    </div>

    <div class="loader" id="loader">
        <div class="loader-spinner" style="width:50px;height:50px;border:4px solid var(--tg-theme-secondary-bg-color);border-top-color:var(--tg-theme-button-color);border-radius:50%;animation:spin 1s linear infinite;"></div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.disableVerticalSwipes();
        
        // Показываем кнопку "Назад" Telegram
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            // Возвращаемся на страницу игры без запуска
            window.location.href = `game.html?id=${gameId}`;
        });
        
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('gameId');
        const adId = urlParams.get('adId') || Math.floor(Math.random() * 3) + 1;

        let adData = null;
        let timer = 10;
        let timerInterval;
        let adSkippable = false;

        // Загрузка рекламы
        async function loadAd() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/ads.json');
                const ads = await response.json();
                adData = ads.find(a => a.id == adId) || ads[0];
                
                if (!adData) throw new Error('Реклама не найдена');
                
                // Применяем фоновый цвет
                if (adData.backgroundColor) {
                    document.getElementById('adContainer').style.setProperty('--ad-bg', adData.backgroundColor);
                }
                
                renderAd(adData);
                startTimer();
                
                document.getElementById('loader').style.display = 'none';
                
            } catch (error) {
                console.error('Ошибка загрузки рекламы:', error);
                // Если реклама не загрузилась, пропускаем её
                goToGame();
            }
        }

        // Отрисовка рекламы
        function renderAd(ad) {
            const adContent = document.getElementById('adContent');
            document.getElementById('adTitle').textContent = ad.title || 'Реклама';
            
            let contentHtml = '';
            
            switch(ad.type) {
                case 'image':
                    contentHtml = `<img class="ad-image" src="${ad.content}" alt="ad" onerror="this.src='https://via.placeholder.com/1080x1920?text=AD'">`;
                    break;
                case 'video':
                    contentHtml = `
                        <video class="ad-video" autoplay loop muted playsinline>
                            <source src="${ad.content}" type="video/mp4">
                        </video>
                    `;
                    break;
                case 'site':
                    contentHtml = `<iframe class="ad-site" src="${ad.content}" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>`;
                    break;
                default:
                    contentHtml = `<img class="ad-image" src="${ad.content}" alt="ad">`;
            }
            
            adContent.innerHTML = contentHtml;
        }

        // Таймер
        function startTimer() {
            timerInterval = setInterval(() => {
                timer--;
                document.getElementById('timer').textContent = `${timer}с`;
                document.getElementById('progressFill').style.width = `${(10 - timer) * 10}%`;
                
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('closeBtn').classList.add('active');
                    document.getElementById('timer').style.opacity = '0.5';
                    adSkippable = true;
                    tg.HapticFeedback.impactOccurred('medium');
                }
            }, 1000);
        }

        // Пропуск рекламы
        window.skipAd = function() {
            if (!adSkippable) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            tg.HapticFeedback.impactOccurred('light');
            goToGame();
        };

        // Кнопка "Открыть"
        window.handleAdButton = function() {
            if (adData.buttonLink) {
                tg.openLink(adData.buttonLink);
                tg.HapticFeedback.impactOccurred('medium');
            }
        };

        // Переход к игре
        function goToGame() {
            clearInterval(timerInterval);
            tg.HapticFeedback.notificationOccurred('success');
            
            // Переходим обратно на open.html, но с флагом, что реклама показана
            // Используем replace, чтобы убрать ad.html из истории
            window.location.replace(`open.html?id=${gameId}&adShown=true`);
        }

        // Применяем тему
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a1a1a');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#222222');
        }

        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
        
        // Загружаем рекламу
        loadAd();
    </script>
</body>
</html>
