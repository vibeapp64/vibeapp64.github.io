<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeApp | Реклама</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background: #000;
            color: white;
        }

        .ad-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--ad-bg, linear-gradient(145deg, #1a1a2e, #16213e));
            border-radius: 0;
            position: relative;
        }

        .ad-content {
            width: 100%;
            max-width: 400px;
            border-radius: 40px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            aspect-ratio: 1/1;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ad-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ad-site-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .ad-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 24px;
            text-align: center;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
            letter-spacing: -0.5px;
        }

        .button-group {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ad-button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 15px 25px rgba(64,167,227,0.5);
            transition: transform 0.2s, opacity 0.2s;
            min-width: 160px;
        }

        .ad-button:active {
            transform: scale(0.96);
        }

        .close-button {
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            cursor: not-allowed;
            opacity: 0.5;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 140px;
        }

        .close-button.active {
            opacity: 1;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
        }

        .timer-container {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.3);
            padding: 10px 24px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            margin-top: 20px;
        }

        .timer-progress {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #40a7e3);
            width: 100%;
            transition: width linear;
        }
    </style>
</head>
<body>
    <div class="ad-screen" id="adScreen">
        <div class="ad-content" id="adContent"></div>
        <div class="ad-title" id="adTitle"></div>
        <div class="button-group">
            <button class="ad-button" id="actionButton">Открыть</button>
            <button class="close-button" id="closeButton" disabled>Закрыть</button>
        </div>
        <div class="timer-container">
            <span id="timerText">10 секунд</span>
            <div class="timer-progress">
                <div class="timer-fill" id="timerFill"></div>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.disableVerticalSwipes();
        tg.BackButton.hide(); // На рекламе своя навигация
        tg.ready();

        // Парсим параметры (если передали конкретное объявление)
        const urlParams = new URLSearchParams(window.location.search);
        const adId = urlParams.get('id');

        // Элементы
        const adContent = document.getElementById('adContent');
        const adTitle = document.getElementById('adTitle');
        const actionButton = document.getElementById('actionButton');
        const closeButton = document.getElementById('closeButton');
        const timerText = document.getElementById('timerText');
        const timerFill = document.getElementById('timerFill');

        let countdown = 10;
        let adData = null;

        // Загрузка рекламы
        async function loadAd() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/ads.json');
                const ads = await response.json();
                
                // Если есть ID, берём конкретную, иначе случайную
                if (adId) {
                    adData = ads.find(a => a.id == adId);
                } else {
                    adData = ads[Math.floor(Math.random() * ads.length)];
                }
                
                if (!adData) throw new Error('Реклама не найдена');
                
                renderAd(adData);
                startCountdown();
                
                // Устанавливаем цвет фона
                if (adData.backgroundColor) {
                    document.getElementById('adScreen').style.background = adData.backgroundColor;
                }
                
            } catch (error) {
                console.error('Ошибка загрузки рекламы:', error);
                adContent.innerHTML = '<div style="color:red;">Ошибка загрузки рекламы</div>';
                closeButton.classList.add('active');
                closeButton.disabled = false;
            }
        }

        function renderAd(ad) {
            adTitle.textContent = ad.title;
            actionButton.textContent = ad.buttonText;
            
            // Контент
            if (ad.type === 'image') {
                adContent.innerHTML = `<img class="ad-image" src="${ad.content}" alt="ad" loading="lazy">`;
            } else if (ad.type === 'video') {
                adContent.innerHTML = `<video class="ad-video" src="${ad.content}" autoplay loop muted playsinline></video>`;
            } else if (ad.type === 'site') {
                adContent.innerHTML = `<iframe class="ad-site-frame" src="${ad.content}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>`;
            }
            
            // Действие по кнопке
            actionButton.onclick = () => {
                tg.HapticFeedback.impactOccurred('medium');
                tg.openLink(ad.buttonLink);
            };
        }

        function startCountdown() {
            const interval = setInterval(() => {
                countdown--;
                timerText.textContent = countdown + ' секунд';
                
                // Прогресс-бар
                const percent = (countdown / 10) * 100;
                timerFill.style.width = percent + '%';
                
                if (countdown <= 0) {
                    clearInterval(interval);
                    timerText.textContent = 'Можно закрыть';
                    closeButton.classList.add('active');
                    closeButton.disabled = false;
                    
                    // Закрытие по кнопке
                    closeButton.onclick = () => {
                        tg.HapticFeedback.impactOccurred('light');
                        window.close(); // Закрываем окно/вкладку
                        // Если не получилось закрыть, показываем кнопку "Назад"
                        tg.BackButton.show();
                        tg.BackButton.onClick(() => window.close());
                    };
                }
            }, 1000);
        }

        loadAd();

        // Тема
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
        }
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
    </script>
</body>
</html>
