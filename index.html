<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeApp | Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.4;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 16px 12px 80px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Хедер */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }

        .header-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--tg-theme-button-color, #40a7e3) 0%, #8a3ffc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-profile {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--tg-theme-button-color, #40a7e3);
            border: 2px solid var(--tg-theme-button-color, #40a7e3);
            cursor: pointer;
        }

        /* Поиск */
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.7;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border-radius: 30px;
            border: none;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            box-shadow: 0 0 0 2px var(--tg-theme-button-color, #40a7e3);
        }

        .search-input::placeholder {
            color: var(--tg-theme-hint-color, #999999);
        }

        /* Баннер слайдер */
        .banner-section {
            margin: 0 -4px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: "●";
            color: var(--tg-theme-button-color, #40a7e3);
            font-size: 24px;
        }

        .banners-slider {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 4px 4px 12px;
            scrollbar-width: none;
        }

        .banners-slider::-webkit-scrollbar {
            display: none;
        }

        .banner-card {
            flex: 0 0 85%;
            scroll-snap-align: start;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            background: var(--tg-theme-secondary-bg-color);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .banner-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 16px 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 2;
            color: white;
        }

        .banner-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .banner-button {
            display: inline-block;
            padding: 8px 16px;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, white);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Категории */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .category-item {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 20px;
            padding: 12px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .category-item:active {
            background: var(--tg-theme-bg-color);
            border-color: var(--tg-theme-button-color);
            transform: scale(0.96);
        }

        .category-emoji {
            font-size: 24px;
        }

        .category-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--tg-theme-text-color);
        }

        /* Сетка игр */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .game-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--tg-theme-section-separator-color, #e0e0e0);
        }

        .game-card:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .game-icon {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-bottom: 2px solid var(--tg-theme-button-color);
        }

        .game-info {
            padding: 12px;
        }

        .game-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-genre {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999999);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Статус бар (как в примере) */
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            max-width: 500px;
            margin: 0 auto;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 30px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            border: 1px solid var(--tg-theme-section-separator-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(150px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .status-bar.visible {
            transform: translateY(0);
        }

        .status-message {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-icon {
            width: 24px;
            height: 24px;
            border-radius: 12px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .status-close {
            background: none;
            border: none;
            color: var(--tg-theme-hint-color);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* Лоадер и ошибки */
        .loader {
            display: flex;
            justify-content: center;
            padding: 40px;
            color: var(--tg-theme-hint-color);
        }

        .error-message {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-destructive-text-color, #e34a4a);
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Хедер -->
        <div class="header">
            <h1 class="header-title">VibeApp</h1>
            <div class="header-profile" id="profileAvatar">👤</div>
        </div>

        <!-- Поиск -->
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="Поиск игр..." id="searchInput">
        </div>

        <!-- Баннеры (будут заполнены из JS) -->
        <div class="banner-section">
            <h2 class="section-title">Актуальное</h2>
            <div class="banners-slider" id="bannersContainer"></div>
        </div>

        <!-- Категории -->
        <div>
            <h2 class="section-title">Категории</h2>
            <div class="categories-grid">
                <div class="category-item" data-genre="All">
                    <span class="category-emoji">🎮</span>
                    <span class="category-name">Все</span>
                </div>
                <div class="category-item" data-genre="Runner">
                    <span class="category-emoji">🏃</span>
                    <span class="category-name">Раннеры</span>
                </div>
                <div class="category-item" data-genre="Arcade">
                    <span class="category-emoji">👾</span>
                    <span class="category-name">Аркады</span>
                </div>
                <div class="category-item" data-genre="Puzzle">
                    <span class="category-emoji">🧩</span>
                    <span class="category-name">Головоломки</span>
                </div>
            </div>
        </div>

        <!-- Игры -->
        <div>
            <h2 class="section-title">Популярные игры</h2>
            <div class="games-grid" id="gamesContainer">
                <div class="loader">Загрузка игр...</div>
            </div>
        </div>
    </div>

    <!-- Статус бар -->
    <div class="status-bar" id="statusBar">
        <div class="status-message">
            <span class="status-icon" id="statusIcon">✓</span>
            <span class="status-text" id="statusText">Добро пожаловать в VibeApp!</span>
        </div>
        <button class="status-close" onclick="hideStatus()">✕</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.disableVerticalSwipes();
        tg.ready();

        // Данные
        let allGames = [];
        let filteredGames = [];
        let banners = [];
        let currentFilter = 'All';

        // Элементы
        const gamesContainer = document.getElementById('gamesContainer');
        const bannersContainer = document.getElementById('bannersContainer');
        const searchInput = document.getElementById('searchInput');
        const profileAvatar = document.getElementById('profileAvatar');
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const statusIcon = document.getElementById('statusIcon');

        // Telegram пользователь
        const user = tg.initDataUnsafe?.user;
        if (user?.first_name) {
            profileAvatar.textContent = user.first_name[0].toUpperCase();
        }

        // Загрузка баннеров
        async function loadBanners() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/banners.json');
                banners = await response.json();
                renderBanners();
            } catch (error) {
                console.error('Ошибка загрузки баннеров:', error);
                showStatus('Не удалось загрузить баннеры', 'error');
            }
        }

        // Загрузка игр
        async function loadGames() {
            try {
                gamesContainer.innerHTML = '<div class="loader">Загрузка игр...</div>';
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/games.json');
                allGames = await response.json();
                filteredGames = [...allGames];
                renderGames(filteredGames);
                showStatus(`Загружено ${allGames.length} игр`, 'success');
            } catch (error) {
                console.error('Ошибка загрузки игр:', error);
                gamesContainer.innerHTML = '<div class="error-message">😵 Не удалось загрузить игры. Потяните вниз, чтобы обновить.</div>';
                showStatus('Ошибка загрузки', 'error');
            }
        }

        // Рендер баннеров
        function renderBanners() {
            if (!banners.length) return;
            
            bannersContainer.innerHTML = banners.map(banner => `
                <div class="banner-card">
                    <img class="banner-image" src="${banner.image}" alt="${banner.title}" loading="lazy">
                    <div class="banner-overlay">
                        <div class="banner-title">${banner.title}</div>
                        <button class="banner-button" onclick="openBannerLink('${banner.buttonLink}')">${banner.buttonText}</button>
                    </div>
                </div>
            `).join('');
        }

        // Открытие ссылки баннера
        window.openBannerLink = (link) => {
            tg.openLink(link);
            tg.HapticFeedback.impactOccurred('light');
        };

        // Рендер игр
        function renderGames(games) {
            if (!games.length) {
                gamesContainer.innerHTML = '<div class="error-message">😕 Игры не найдены</div>';
                return;
            }

            gamesContainer.innerHTML = games.map(game => `
                <div class="game-card" onclick="openGame(${game.id})">
                    <img class="game-icon" src="${game.icon}" alt="${game.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=🎮'">
                    <div class="game-info">
                        <div class="game-title">${game.title}</div>
                        <div class="game-genre"><span>🎮</span> ${game.genre}</div>
                    </div>
                </div>
            `).join('');
        }

        // Открытие страницы игры
        window.openGame = (id) => {
            tg.HapticFeedback.impactOccurred('medium');
            window.location.href = `game.html?id=${id}`;
        };

        // Фильтрация по категории
        document.querySelectorAll('.category-item').forEach(item => {
            item.addEventListener('click', () => {
                const genre = item.dataset.genre;
                currentFilter = genre;
                
                if (genre === 'All') {
                    filteredGames = [...allGames];
                } else {
                    filteredGames = allGames.filter(g => g.genre === genre);
                }
                
                renderGames(filteredGames);
                tg.HapticFeedback.impactOccurred('light');
                showStatus(`Фильтр: ${genre === 'All' ? 'Все игры' : genre}`, 'success');
            });
        });

        // Поиск
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (!query) {
                filteredGames = currentFilter === 'All' 
                    ? [...allGames] 
                    : allGames.filter(g => g.genre === currentFilter);
            } else {
                const baseList = currentFilter === 'All' ? allGames : allGames.filter(g => g.genre === currentFilter);
                filteredGames = baseList.filter(game => 
                    game.title.toLowerCase().includes(query) ||
                    game.creator.toLowerCase().includes(query) ||
                    game.genre.toLowerCase().includes(query)
                );
            }
            
            renderGames(filteredGames);
        });

        // Статус бар
        function showStatus(message, type = 'normal') {
            statusText.textContent = message;
            
            switch(type) {
                case 'success':
                    statusIcon.textContent = '✓';
                    statusIcon.style.background = 'var(--tg-theme-button-color, #40a7e3)';
                    break;
                case 'error':
                    statusIcon.textContent = '⚠';
                    statusIcon.style.background = 'var(--tg-theme-destructive-text-color, #e34a4a)';
                    break;
                default:
                    statusIcon.textContent = 'ℹ';
                    statusIcon.style.background = 'var(--tg-theme-hint-color, #999)';
            }
            
            statusBar.classList.add('visible');
            
            if (window.statusTimeout) clearTimeout(window.statusTimeout);
            window.statusTimeout = setTimeout(hideStatus, 3000);
        }

        window.hideStatus = () => {
            statusBar.classList.remove('visible');
        };

        // Инициализация
        loadBanners();
        loadGames();

        // Применяем тему
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
            style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
            style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f0f0f0');
        }
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
    </script>
</body>
</html>
