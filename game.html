<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeApp | Об игре</title>
    <style>
        /* Базовые стили - аналогично index.html */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.4;
            font-size: 16px;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 16px 12px 80px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Кнопка назад */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 0;
            cursor: pointer;
            color: var(--tg-theme-button-color, #40a7e3);
            font-weight: 600;
            font-size: 18px;
            width: fit-content;
        }

        .back-button:active {
            opacity: 0.6;
        }

        /* Шапка игры */
        .game-header {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 30px;
            padding: 24px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .game-icon-large {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            object-fit: cover;
            border: 4px solid var(--tg-theme-button-color, #40a7e3);
            background: white;
        }

        .game-title-large {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .game-creator {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 12px;
        }

        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .meta-tag {
            background: var(--tg-theme-bg-color, #ffffff);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid var(--tg-theme-section-separator-color);
        }

        /* Кнопка запуска */
        .play-button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 18px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(64, 167, 227, 0.4);
            margin: 20px 0 10px;
            transition: all 0.2s;
        }

        .play-button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        /* Скриншоты */
        .screenshots-slider {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 4px 4px 12px;
            scrollbar-width: none;
        }

        .screenshots-slider::-webkit-scrollbar {
            display: none;
        }

        .screenshot-item {
            flex: 0 0 70%;
            scroll-snap-align: start;
            border-radius: 24px;
            aspect-ratio: 16/9;
            object-fit: cover;
            border: 2px solid var(--tg-theme-section-separator-color);
        }

        /* Описание */
        .description-block {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            padding: 20px;
            line-height: 1.6;
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-section-separator-color);
        }

        .section-subtitle {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loader, .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--tg-theme-hint-color);
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 30px;
        }
        .error-message { color: var(--tg-theme-destructive-text-color); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="back-button" onclick="goBack()">← Назад</div>
        <div id="content">
            <div class="loader">Загрузка игры...</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Получаем ID из URL
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');

        if (!gameId) {
            window.location.href = 'index.html';
        }

        async function loadGame() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vibeapp64/vibeapp64.github.io/refs/heads/main/apps/games.json');
                const games = await response.json();
                const game = games.find(g => g.id == gameId);

                if (!game) throw new Error('Игра не найдена');

                renderGame(game);
                tg.HapticFeedback.notificationOccurred('success');
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error-message">
                        😵 Ошибка загрузки игры<br>
                        <button class="play-button" style="margin-top:20px; padding:12px;" onclick="goBack()">Вернуться на главную</button>
                    </div>
                `;
            }
        }

        function renderGame(game) {
            const orientationEmoji = game.orientation === 'landscape' ? '🔄 Горизонтальная' : '📱 Вертикальная';
            
            const screenshotsHtml = game.screenshots?.map(src => 
                `<img class="screenshot-item" src="${src}" alt="screenshot" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200?text=🎮'">`
            ).join('') || '';

            const content = `
                <div class="game-header">
                    <img class="game-icon-large" src="${game.icon}" alt="${game.title}" onerror="this.src='https://via.placeholder.com/100?text=🎮'">
                    <div>
                        <div class="game-title-large">${game.title}</div>
                        <div class="game-creator">${game.creator}</div>
                        <div class="game-meta">
                            <span class="meta-tag">🎮 ${game.genre}</span>
                            <span class="meta-tag">${orientationEmoji}</span>
                        </div>
                    </div>
                </div>

                <button class="play-button" onclick="startGame(${game.id})">
                    🚀 Запустить игру
                </button>

                ${screenshotsHtml ? `
                    <div>
                        <div class="section-subtitle">📸 Скриншоты</div>
                        <div class="screenshots-slider">
                            ${screenshotsHtml}
                        </div>
                    </div>
                ` : ''}

                <div>
                    <div class="section-subtitle">📝 Описание</div>
                    <div class="description-block">
                        ${game.description || 'Описание отсутствует.'}
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = content;
        }

        window.startGame = (id) => {
            tg.HapticFeedback.impactOccurred('medium');
            window.location.href = `open.html?id=${id}`;
        };

        window.goBack = () => {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'index.html';
        };

        loadGame();

        // Тема
        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
            style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
            style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#40a7e3');
            style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f0f0f0');
        }
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
    </script>
</body>
</html>
